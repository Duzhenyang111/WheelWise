<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>付款跟进验证看板</title>
  <style>
    body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#faf8ff;color:#241b33}
    main{max-width:960px;margin:auto;padding:24px}.panel{background:#fff;border:1px solid #e0d9ef;border-radius:8px;padding:18px;margin-bottom:16px}
    input,select,textarea{width:100%;box-sizing:border-box;margin:6px 0 12px;padding:10px;border:1px solid #c9bddf;border-radius:6px}
    button,a.button{display:inline-block;background:#4b2e83;color:#fff;border:0;border-radius:6px;padding:10px 14px;text-decoration:none;cursor:pointer}
    .state{padding:10px;background:#f2ecff;border-radius:6px;margin-top:12px}@media(max-width:720px){main{padding:14px}}
  </style>
</head>
<body>
<main>
  <h1>付款跟进验证看板</h1>
  <p>模拟数据说明：仅使用本地模拟账单，未接入真实后端，不发送消息，不保存客户数据。</p>
  <section class="panel">
    <label>客户名称</label><input id="client" value="青禾设计工作室">
    <label>逾期天数</label><input id="days" value="12">
    <label>提醒语气</label><select id="tone"><option>温和</option><option>正式</option><option>强提醒</option></select>
    <label>备注</label><textarea id="note">对方上周承诺本周付款。</textarea>
    <button id="run">生成提醒草稿</button>
    <a class="button" href="index.html">返回预评审包</a>
    <div id="state" class="state">空状态：暂无草稿。加载、错误、成功状态会随操作变化。</div>
  </section>
  <section class="panel"><h2>草稿结果</h2><ul id="result"><li>暂无提醒。</li></ul></section>
</main>
<script>
document.getElementById("run").addEventListener("click", () => {
  const state = document.getElementById("state");
  const result = document.getElementById("result");
  state.textContent = "加载：正在生成本地模拟草稿。";
  result.innerHTML = "";
  setTimeout(() => {
    if (!document.getElementById("client").value.trim()) {
      state.textContent = "错误：客户名称为空。";
      result.innerHTML = "<li>空状态：暂无可生成内容。</li>";
      return;
    }
    state.textContent = "成功：已生成草稿，仍需人工确认。未接入真实后端。";
    result.innerHTML = "<li>您好，想和您确认一下上次项目款项的预计付款时间，如需补充资料我可以马上提供。</li><li>风险提示：不要自动发送，先由负责人确认语气。</li>";
  }, 300);
});
</script>
</body>
</html>

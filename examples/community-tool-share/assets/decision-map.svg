<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="邻里工具共享管家决策图">
  <defs>
    <style>
      .bg{fill:#f7f9f3}
      .title{font:700 42px Arial,"Microsoft YaHei",sans-serif;fill:#18334a}
      .sub{font:20px Arial,"Microsoft YaHei",sans-serif;fill:#4d6175}
      .head{font:700 25px Arial,"Microsoft YaHei",sans-serif;fill:#18334a}
      .text{font:19px Arial,"Microsoft YaHei",sans-serif;fill:#304b63}
      .small{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#52677a}
      .card{fill:#ffffff;stroke:#cfd8df;stroke-width:2}
      .good{fill:#2f7d57}
      .warn{fill:#c8822f}
      .blue{fill:#316fb0}
      .line{stroke:#96a7b6;stroke-width:4;fill:none;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1280" height="760" class="bg"/>
  <text x="64" y="70" class="title">决策图：为什么先验证，而不是直接大规模开发</text>
  <text x="64" y="108" class="sub">把目标用户、交付形态、最小范围、复用决策、风险和验证条件放在一张图里</text>

  <rect x="64" y="158" width="250" height="170" rx="18" class="card"/>
  <circle cx="100" cy="204" r="18" class="blue"/>
  <text x="130" y="211" class="head">目标用户</text>
  <text x="92" y="252" class="text">社区管理员</text>
  <text x="92" y="286" class="text">愿意共享工具的居民</text>
  <text x="92" y="320" class="small">先找一个小区试点</text>

  <rect x="394" y="158" width="250" height="170" rx="18" class="card"/>
  <circle cx="430" cy="204" r="18" class="good"/>
  <text x="460" y="211" class="head">交付形态</text>
  <text x="422" y="252" class="text">二维码网页应用</text>
  <text x="422" y="286" class="text">居民端加管理员端</text>
  <text x="422" y="320" class="small">暂不做移动应用</text>

  <rect x="724" y="158" width="250" height="170" rx="18" class="card"/>
  <circle cx="760" cy="204" r="18" class="warn"/>
  <text x="790" y="211" class="head">关键风险</text>
  <text x="752" y="252" class="text">工具主上架意愿</text>
  <text x="752" y="286" class="text">押金与损坏责任</text>
  <text x="752" y="320" class="small">风险比技术更高</text>

  <rect x="1054" y="158" width="170" height="170" rx="18" class="card"/>
  <text x="1086" y="211" class="head">结论</text>
  <text x="1084" y="252" class="text">先验证</text>
  <text x="1084" y="286" class="text">再开发</text>
  <text x="1084" y="320" class="small">三周试点</text>

  <path d="M314 244 H394" class="line"/>
  <path d="M644 244 H724" class="line"/>
  <path d="M974 244 H1054" class="line"/>

  <rect x="64" y="420" width="360" height="180" rx="18" class="card"/>
  <text x="96" y="470" class="head">最小可行范围</text>
  <text x="96" y="516" class="text">工具登记、预约申请、管理员确认</text>
  <text x="96" y="552" class="text">归还提醒、异常标记、试点复盘</text>

  <rect x="484" y="420" width="360" height="180" rx="18" class="card"/>
  <text x="516" y="470" class="head">自研 / 复用决策</text>
  <text x="516" y="516" class="text">业务流程自研，通知能力复用</text>
  <text x="516" y="552" class="text">支付与信用记录先参考，不接入</text>

  <rect x="904" y="420" width="260" height="180" rx="18" class="card"/>
  <text x="936" y="470" class="head">继续条件</text>
  <text x="936" y="516" class="text">20 件工具上架</text>
  <text x="936" y="552" class="text">10 次预约</text>
  <text x="936" y="586" class="text">无重大纠纷</text>

  <path d="M244 420 V360 H1138 V328" class="line"/>
  <path d="M664 420 V360" class="line"/>
  <path d="M1034 420 V360" class="line"/>
</svg>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>社区工具预约原型</title>
  <style>
    body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#f7fcf8;color:#16281d}
    main{max-width:960px;margin:auto;padding:24px}.panel{background:#fff;border:1px solid #d7eadc;border-radius:8px;padding:18px;margin-bottom:16px}
    input,select,textarea{width:100%;box-sizing:border-box;margin:6px 0 12px;padding:10px;border:1px solid #b9d6c1;border-radius:6px}
    button,a.button{display:inline-block;background:#1f6b45;color:#fff;border:0;border-radius:6px;padding:10px 14px;text-decoration:none;cursor:pointer}
    .state{padding:10px;background:#ebf8ef;border-radius:6px;margin-top:12px}@media(max-width:720px){main{padding:14px}}
  </style>
</head>
<body>
<main>
  <h1>社区工具预约原型</h1>
  <p>模拟数据说明：本页面使用本地模拟工具和预约数据，未接入真实后端，不保存个人信息，不处理真实押金。</p>
  <section class="panel">
    <label>工具名称</label><input id="tool" value="家用电钻">
    <label>预约时段</label><select id="slot"><option>周六上午</option><option>周六下午</option><option>周日晚上</option></select>
    <label>借用说明</label><textarea id="note">安装置物架，预计使用两小时。</textarea>
    <button id="book">提交预约</button>
    <a class="button" href="index.html">返回预评审包</a>
    <div id="state" class="state">空状态：暂无预约。加载、错误、成功状态会随操作变化。</div>
  </section>
  <section class="panel"><h2>预约结果</h2><ul id="result"><li>暂无预约记录。</li></ul></section>
</main>
<script>
document.getElementById("book").addEventListener("click", () => {
  const state = document.getElementById("state");
  const result = document.getElementById("result");
  state.textContent = "加载：正在生成本地模拟预约。";
  result.innerHTML = "";
  setTimeout(() => {
    if (!document.getElementById("tool").value.trim()) {
      state.textContent = "错误：工具名称为空。";
      result.innerHTML = "<li>空状态：暂无可预约工具。</li>";
      return;
    }
    state.textContent = "成功：预约已进入待确认状态。未接入真实后端。";
    result.innerHTML = "<li>家用电钻：周六上午，待工具主人确认。</li><li>归还提醒：使用后拍照确认工具状态。</li>";
  }, 300);
});
</script>
</body>
</html>
